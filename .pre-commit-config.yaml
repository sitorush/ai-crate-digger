repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: .venv/bin/ruff format
        language: system
        types: [python]
      - id: ruff-lint
        name: ruff lint
        entry: .venv/bin/ruff check --fix
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy src/
        language: system
        types: [python]
        pass_filenames: false
